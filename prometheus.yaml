global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'system-ingress-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'system-ingress-service:8085' ]

  - job_name: 'graph-ingress-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'graph-ingress-service:8081' ]

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: [ 'host.docker.internal:9308' ]

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: [ 'host.docker.internal:9187' ]